coverage:
  status:
    project:
      default:
        target: 70%
        threshold: 2%
    patch:
      default:
        target: 70%

flags:
  backend:
    paths:
      - "internal/"
      - "*.go"
    carryforward: true
  frontend:
    paths:
      - "frontend/src/"
    carryforward: true

ignore:
  - "frontend/wailsjs/"
  - "frontend/e2e/"
  - "build/"
  - "tasks/"
