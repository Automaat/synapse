name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-go:
    name: Go Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (needed for go:embed)
        run: cd frontend && npm ci && npm run build

      - name: Run Go tests with coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./...

      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: coverage.out
          flags: backend
          token: ${{ secrets.CODECOV_TOKEN }}

  test-frontend:
    name: Frontend Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run unit tests with coverage
        run: cd frontend && npx vitest run --coverage --passWithNoTests

      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: frontend/coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}

  lint-go:
    name: Go Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (needed for go:embed)
        run: cd frontend && npm ci && npm run build

      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest

  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache wails binary
        id: cache-wails
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin/wails
          key: wails-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Install wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Lint frontend
        run: cd frontend && npm ci && npx oxlint .

      - name: Build
        run: ~/go/bin/wails build

  e2e:
    name: E2E Tests
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.1"

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache wails binary
        id: cache-wails
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/go/bin/wails
          key: wails-${{ runner.os }}-${{ hashFiles('go.sum') }}

      - name: Install wails
        if: steps.cache-wails.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Install Playwright browsers
        run: cd frontend && npx playwright install chromium

      - name: Start wails dev
        run: |
          wails dev > /tmp/wails-dev.log 2>&1 &
          WAILS_PID=$!
          echo "WAILS_PID=$WAILS_PID" >> "$GITHUB_ENV"
          echo "Waiting for wails dev (pid $WAILS_PID)..."
          for i in $(seq 1 90); do
            if ! kill -0 $WAILS_PID 2>/dev/null; then
              echo "::error::wails dev exited prematurely"
              cat /tmp/wails-dev.log
              exit 1
            fi
            if curl -s http://localhost:34115 > /dev/null 2>&1; then
              echo "Wails dev ready after $((i*2))s"
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "::error::wails dev timed out"
              cat /tmp/wails-dev.log
              exit 1
            fi
            sleep 2
          done
          # Extra wait for Go backend binding bridge
          sleep 5
          echo "--- wails dev log ---"
          cat /tmp/wails-dev.log

      - name: Run e2e tests
        run: cd frontend && npx playwright test --reporter=github

      - name: Dump wails dev log
        if: failure()
        run: cat /tmp/wails-dev.log || true

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: failure()
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7
